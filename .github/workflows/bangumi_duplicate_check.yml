name: Bangumi 重复条目检查与条目筛选

on:
  schedule:
    - cron: '30 21 * * 2'
  workflow_dispatch:

permissions:
  contents: write

env:
  REPORT_PAGES: >-
    https://bgm.tv/group/topic/454229,
    https://bgm.tv/group/topic/461956
  AUTO_MODE: "true"
  ALIAS_JSON: "person_alias.json"
  ALIAS_GZ: "person_alias.json.gz"
  RELEASE_NAME: "Person alias"
  DUCKDB_VERSION: "1.2.0"

jobs:
  check_and_filter:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm beautifulsoup4 bgm-tv-wiki

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: bgq/go.sum

      - name: 下载 DuckDB
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" -o /tmp/duckdb.zip
          unzip -o /tmp/duckdb.zip -d bgq/bin/
          chmod +x bgq/bin/duckdb

      - name: 构建 bgq
        run: |
          cd bgq
          go build -o bin/bgq ./cmd/bgq/

      - name: 生成日期 Tag
        run: echo "TAG_NAME=$(date -u +'%Y%m%d')" >> $GITHUB_ENV

      - name: 下载 Bangumi 归档
        run: python download_bangumi_archive.py

      # ===== 原有任务 =====
      - name: 检查重复条目
        run: python find_duplicate_isbns.py

      - name: 生成别名 JSON
        run: python person_alias.py

      - name: gzip 压缩
        run: gzip -9 -c ${{ env.ALIAS_JSON }} > ${{ env.ALIAS_GZ }}

      # ===== 新增：条目筛选 =====
      - name: 执行筛选查询
        env:
          DUCKDB_PATH: ${{ github.workspace }}/bgq/bin/duckdb
        run: |
          mkdir -p results
          DATA_DIR="${GITHUB_WORKSPACE}/bangumi_archive"
          BIN="${GITHUB_WORKSPACE}/bgq/bin/bgq"

          success=0
          fail=0

          for yaml_file in filters/*.yaml; do
            if [ ! -f "$yaml_file" ]; then
              echo "⚠ 没有找到 YAML 配置文件"
              continue
            fi

            name=$(basename "$yaml_file" .yaml)
            echo ""
            echo "========================================"
            echo "  处理: $name"
            echo "========================================"

            if "${BIN}" query \
                --config "$yaml_file" \
                --data-dir "${DATA_DIR}" \
                --format csv \
                --output "results/${name}.csv" \
                2>&1; then
              lines=$(wc -l < "results/${name}.csv" 2>/dev/null || echo 0)
              echo "✅ ${name} 完成 (${lines} 行)"
              success=$((success + 1))
            else
              echo "❌ ${name} 失败"
              fail=$((fail + 1))
            fi
          done

          echo ""
          echo "  筛选完成: ${success} 成功, ${fail} 失败"

      # ===== 构建 Web 数据库 =====
      - name: 构建 Web 数据库
        run: |
          set -e
          DATA_DIR="${GITHUB_WORKSPACE}/bangumi_archive"
          DUCKDB="${GITHUB_WORKSPACE}/bgq/bin/duckdb"
          DB_FILE="/tmp/bangumi_web.db"

          echo "数据目录: ${DATA_DIR}"
          echo "构建 bangumi_web.db ..."

          printf '%s\n' \
            "CREATE TABLE subjects AS" \
            "  SELECT id, type, name, name_cn, infobox, platform," \
            "         nsfw, score, rank, date, series, tags, meta_tags" \
            "  FROM read_json_auto('${DATA_DIR}/subject.jsonlines', format='newline_delimited');" \
            "CREATE TABLE subject_relations AS" \
            "  SELECT subject_id, relation_type, related_subject_id, \"order\"" \
            "  FROM read_json_auto('${DATA_DIR}/subject-relations.jsonlines', format='newline_delimited');" \
            "CREATE TABLE subject_persons AS" \
            "  SELECT person_id, subject_id, \"position\", appear_eps" \
            "  FROM read_json_auto('${DATA_DIR}/subject-persons.jsonlines', format='newline_delimited');" \
            "CREATE TABLE episodes AS" \
            "  SELECT id, name, name_cn, airdate, disc, duration, subject_id, sort, type" \
            "  FROM read_json_auto('${DATA_DIR}/episode.jsonlines', format='newline_delimited');" \
            "CREATE INDEX idx_sub_type ON subjects(type);" \
            "CREATE INDEX idx_sub_score ON subjects(score);" \
            "CREATE INDEX idx_rel_subject ON subject_relations(subject_id);" \
            "CREATE INDEX idx_ep_subject ON episodes(subject_id);" \
            "CREATE INDEX idx_per_subject ON subject_persons(subject_id);" \
            > /tmp/build_web_db.sql

          "${DUCKDB}" "${DB_FILE}" -f /tmp/build_web_db.sql
          echo "数据库大小: $(du -h ${DB_FILE} | cut -f1)"

      # ===== 上传产物 =====
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: bangumi-results
          path: |
            duplicate_check_results.txt
            ${{ env.ALIAS_GZ }}
            results/*.csv

      # ===== 提交结果 =====
      - name: 提交结果到仓库
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add duplicate_check_results.txt results/
          if git diff --cached --quiet; then
            echo "结果无变更，跳过提交"
          else
            git commit -m "更新重复检查与筛选结果 ${{ env.TAG_NAME }}"
            git push
          fi

      - name: 删旧 Tag 建新 Tag
        run: |
          git fetch --tags
          git tag -d ${{ env.TAG_NAME }} 2>/dev/null || true
          git push origin :refs/tags/${{ env.TAG_NAME }} 2>/dev/null || true
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: "生成日期：${{ env.TAG_NAME }}"
          files: |
            ${{ env.ALIAS_GZ }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 导出并准备网页版
        run: |
          ${GITHUB_WORKSPACE}/bgq/bin/bgq export-deploy --output bgq/deploy/index.html
          # Download DuckDB-WASM worker/wasm files (same-origin required)
          CDN="https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist"
          for f in duckdb-mvp.wasm duckdb-eh.wasm duckdb-browser-mvp.worker.js duckdb-browser-eh.worker.js; do
            curl -fsSL "${CDN}/${f}" -o bgq/deploy/"${f}"
          done
          ls -lh bgq/deploy/

      - name: 部署网页版
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: bgq/deploy
          destination_dir: bgq
          commit_message: '部署网页版 ${{ env.TAG_NAME }}'
