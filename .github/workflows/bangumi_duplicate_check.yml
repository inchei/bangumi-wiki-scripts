name: Bangumi 重复条目检查与条目筛选

on:
  schedule:
    - cron: '30 21 * * 2'
  workflow_dispatch:

permissions:
  contents: write

env:
  REPORT_PAGES: >-
    https://bgm.tv/group/topic/454229,
    https://bgm.tv/group/topic/461956
  AUTO_MODE: "true"
  ALIAS_JSON: "person_alias.json"
  ALIAS_GZ: "person_alias.json.gz"
  RELEASE_NAME: "Weekly Build"
  DUCKDB_VERSION: "1.2.0"

jobs:
  check_and_filter:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm beautifulsoup4 bgm-tv-wiki

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bgq/go.mod
          cache-dependency-path: bgq/go.sum

      - name: 下载 DuckDB
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" -o /tmp/duckdb.zip
          unzip -o /tmp/duckdb.zip -d bgq/bin/
          chmod +x bgq/bin/duckdb

      - name: 构建 bgq
        run: |
          cd bgq
          go build -o bin/bgq ./cmd/bgq/

      - name: 生成日期 Tag
        run: echo "TAG_NAME=$(date -u +'%Y%m%d')" >> $GITHUB_ENV

      - name: 下载 Bangumi 归档
        run: python download_bangumi_archive.py

      # ===== 原有任务 =====
      - name: 检查重复条目
        run: python find_duplicate_isbns.py

      - name: 生成别名 JSON
        run: python person_alias.py

      - name: gzip 压缩
        run: gzip -9 -c ${{ env.ALIAS_JSON }} > ${{ env.ALIAS_GZ }}

      # ===== 新增：条目筛选 =====
      - name: 执行筛选查询
        env:
          DUCKDB_PATH: ${{ github.workspace }}/bgq/bin/duckdb
        run: |
          mkdir -p results
          DATA_DIR="${GITHUB_WORKSPACE}/bangumi_archive"
          BIN="${GITHUB_WORKSPACE}/bgq/bin/bgq"

          success=0
          fail=0

          for yaml_file in filters/*.yaml; do
            if [ ! -f "$yaml_file" ]; then
              echo "⚠ 没有找到 YAML 配置文件"
              continue
            fi

            name=$(basename "$yaml_file" .yaml)
            echo ""
            echo "========================================"
            echo "  处理: $name"
            echo "========================================"

            if "${BIN}" query \
                --config "$yaml_file" \
                --data-dir "${DATA_DIR}" \
                --format csv \
                --output "results/${name}.csv" \
                2>&1; then
              lines=$(wc -l < "results/${name}.csv" 2>/dev/null || echo 0)
              echo "✅ ${name} 完成 (${lines} 行)"
              success=$((success + 1))
            else
              echo "❌ ${name} 失败"
              fail=$((fail + 1))
            fi
          done

          echo ""
          echo "  筛选完成: ${success} 成功, ${fail} 失败"

      # ===== 上传产物 =====
      - name: 上传筛选结果
        uses: actions/upload-artifact@v4
        with:
          name: bangumi-results
          path: |
            duplicate_check_results.txt
            ${{ env.ALIAS_GZ }}
            results/*.csv

      # ===== 提交结果 =====
      - name: 提交结果到仓库
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add duplicate_check_results.txt results/
          if git diff --cached --quiet; then
            echo "结果无变更，跳过提交"
          else
            git commit -m "更新重复检查与筛选结果 ${{ env.TAG_NAME }}"
            git push
          fi

      - name: 删旧 Tag 建新 Tag
        run: |
          git fetch --tags
          git tag -d ${{ env.TAG_NAME }} 2>/dev/null || true
          git push origin :refs/tags/${{ env.TAG_NAME }} 2>/dev/null || true
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}

  build_binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            duckdb_suffix: linux-amd64
            archive_suffix: tar.gz
          - goos: darwin
            goarch: arm64
            duckdb_suffix: osx-arm64
            archive_suffix: tar.gz
          - goos: darwin
            goarch: amd64
            duckdb_suffix: osx-amd64
            archive_suffix: tar.gz
          - goos: windows
            goarch: amd64
            duckdb_suffix: windows-amd64
            archive_suffix: zip
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bgq/go.mod
          cache-dependency-path: bgq/go.sum

      - name: 构建 bgq
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd bgq
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -o "bgq-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/bgq/

      - name: 下载 DuckDB
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-${{ matrix.duckdb_suffix }}.zip" -o /tmp/duckdb.zip
          unzip -o /tmp/duckdb.zip -d /tmp/duckdb-extract/
          # DuckDB zip 内文件名不统一，取第一个可执行文件
          cp /tmp/duckdb-extract/duckdb* /tmp/duckdb-bin 2>/dev/null || true
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv /tmp/duckdb-extract/duckdb.exe /tmp/duckdb-bin.exe 2>/dev/null || true
          fi

      - name: 打包
        run: |
          PKG_NAME="bgq-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "/tmp/${PKG_NAME}"

          # 复制 bgq 二进制
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          cp "bgq/${PKG_NAME}${EXT}" "/tmp/${PKG_NAME}/"

          # 复制 DuckDB
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp /tmp/duckdb-extract/duckdb.exe "/tmp/${PKG_NAME}/"
          else
            DUCKDB_BIN=$(find /tmp/duckdb-extract -name 'duckdb' -type f | head -1)
            if [ -n "$DUCKDB_BIN" ]; then
              cp "$DUCKDB_BIN" "/tmp/${PKG_NAME}/"
              chmod +x "/tmp/${PKG_NAME}/duckdb"
            fi
          fi

          # 复制 README
          cp bgq/README.md "/tmp/${PKG_NAME}/"

          # 打包
          cd /tmp
          if [ "${{ matrix.archive_suffix }}" = "zip" ]; then
            zip -r "${GITHUB_WORKSPACE}/${PKG_NAME}.zip" "${PKG_NAME}/"
          else
            tar czf "${GITHUB_WORKSPACE}/${PKG_NAME}.tar.gz" "${PKG_NAME}/"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: bgq-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bgq-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            bgq-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    needs: [check_and_filter, build_binaries]
    runs-on: ubuntu-latest
    steps:
      - name: 生成日期 Tag
        run: echo "TAG_NAME=$(date -u +'%Y%m%d')" >> $GITHUB_ENV

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bgq-*
          merge-multiple: true

      - name: 下载筛选结果
        uses: actions/download-artifact@v4
        with:
          name: bangumi-results
          path: release-assets

      - name: 列出发布文件
        run: ls -lh release-assets/

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            ## bgq 跨平台二进制

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `bgq-linux-amd64.tar.gz` |
            | macOS ARM (M系列) | `bgq-darwin-arm64.tar.gz` |
            | macOS Intel | `bgq-darwin-amd64.tar.gz` |
            | Windows x86_64 | `bgq-windows-amd64.zip` |

            每个包内包含 `bgq`（或 `bgq.exe`）、`duckdb`（或 `duckdb.exe`）和 `README.md`。

            ### 使用方法

            1. 下载对应平台的压缩包并解压
            2. 下载 [Bangumi Archive](https://github.com/bangumi/Archive/releases/latest) 数据
            3. 运行查询：
               ```bash
               ./bgq query --config query.yaml --data-dir ./bangumi_archive
               ```
            4. 或启动 Web 界面：
               ```bash
               ./bgq serve --data-dir ./bangumi_archive
               ```

            ## 附件

            - `person_alias.json.gz` — 人物别名数据
            - `results/*.csv` — 本周筛选结果
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/${{ env.ALIAS_GZ }}
            release-assets/results/*.csv
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
