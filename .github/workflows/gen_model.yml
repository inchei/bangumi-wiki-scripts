name: update common

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: 设置 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: bgq/go.mod
          cache-dependency-path: bgq/go.sum

      - name: 下载 Bangumi 归档
        run: bash bgq/download-archive.sh bangumi_archive

      - name: 运行 go generate
        run: cd bgq && go generate ./internal/model/

      - name: 提交变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bgq/internal/model/ bgq/frontend/src/schema-data.js wikiMissingPositions/src/position-ids.js 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "chore: update generated model files"
            git push
          fi
