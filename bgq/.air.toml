# Air live-reload configuration for bgq
# Usage: go tool air
# Or: bgq serve --dev (generates config dynamically with --data-dir/--listen args)

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/bgq"
  cmd = "go build -o ./tmp/bgq ./cmd/bgq"
  entrypoint = ["./tmp/bgq", "serve", "--data-dir", "./bangumi_archive", "--listen", ":8080"]
  delay = 1000
  exclude_dir = ["tmp", "deploy", "bin"]
  exclude_regex = ["_test.go$", "\\.db$"]
  exclude_unchanged = false
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = false

[log]
  time = false

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true
