data_dir: "../bangumi_archive"
filters:
  - type:
      value: 1
  - relation:
      type: "单行本"
      mode: any
      conditions:
        - field:
            field: 发售日
            operator: after
            value: "2024-01-01"
        - type:
            value: 1
        - field:
            field: 出版社
            operator: contains
            value: "角川"
        - meta_tag:
            value: "小说"
output:
  format: table
  columns:
    - id
    - name
    - score
limit: 10
